<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leads — Chatbot Cardenas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #133d8d;
    --primary-light: #1a4fa6;
    --accent: #fcbb16;
    --bg: #f5f6f8;
    --white: #ffffff;
    --text: #2c3240;
    --text-light: #6b7280;
    --border: #e2e5ea;
    --green: #16a34a;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .header {
    background: var(--primary);
    color: var(--white);
    padding: 0 28px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header h1 { font-size: 17px; font-weight: 700; letter-spacing: 0.02em; }
  .header-right { display: flex; gap: 10px; align-items: center; }
  .btn {
    padding: 8px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-accent {
    background: var(--accent);
    color: var(--primary);
  }
  .btn-accent:hover { background: #e5a914; }
  .btn-ghost {
    background: rgba(255,255,255,0.15);
    color: var(--white);
  }
  .btn-ghost:hover { background: rgba(255,255,255,0.25); }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 28px 20px;
  }

  .stats {
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .stat-card {
    background: var(--white);
    border-radius: 12px;
    padding: 20px 24px;
    box-shadow: var(--shadow);
    min-width: 160px;
    flex: 1;
  }
  .stat-card .label {
    font-size: 12px;
    color: var(--text-light);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
  }
  .stat-card .value {
    font-size: 28px;
    font-weight: 700;
    color: var(--primary);
  }
  .stat-card .sub {
    font-size: 12px;
    color: var(--text-light);
    margin-top: 2px;
  }

  .table-wrapper {
    background: var(--white);
    border-radius: 12px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .table-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .table-header h2 { font-size: 15px; font-weight: 600; }
  .table-header .refresh-hint {
    font-size: 12px;
    color: var(--text-light);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    text-align: left;
    padding: 12px 16px;
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-light);
    border-bottom: 2px solid var(--border);
    white-space: nowrap;
  }
  tbody td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: #f8f9fb; }

  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    text-transform: capitalize;
  }
  .badge-comprar { background: #dbeafe; color: #1e40af; }
  .badge-vender { background: #fef3c7; color: #92400e; }
  .badge-alquilar { background: #d1fae5; color: #065f46; }
  .badge-informacion { background: #f3f4f6; color: #4b5563; }

  .contact-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .contact-info .email { color: var(--primary); }
  .contact-info .phone { color: var(--text-light); }

  .summary-text {
    max-width: 250px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    line-height: 1.4;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-light);
  }
  .empty-state h3 {
    font-size: 16px;
    color: var(--text);
    margin-bottom: 8px;
  }
  .empty-state p { font-size: 13px; }

  .loading { text-align: center; padding: 40px; color: var(--text-light); }

  .live-dot {
    width: 8px; height: 8px;
    background: var(--green);
    border-radius: 50%;
    display: inline-block;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  @media (max-width: 768px) {
    .stats { flex-direction: column; }
    .table-wrapper { overflow-x: auto; }
    table { min-width: 700px; }
    .container { padding: 16px 12px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>CARDENAS — Leads Bot</h1>
  <div class="header-right">
    <span class="live-dot" title="Actualizacion automatica"></span>
    <a href="/chatbot/api/leads/csv" class="btn btn-accent">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Exportar CSV
    </a>
    <a href="/chatbot/" class="btn btn-ghost">Abrir Chat</a>
    <a href="/" class="btn btn-ghost">Dashboard</a>
  </div>
</div>

<div class="container">
  <div class="stats">
    <div class="stat-card">
      <div class="label">Total Leads</div>
      <div class="value" id="statTotal">-</div>
    </div>
    <div class="stat-card">
      <div class="label">Hoy</div>
      <div class="value" id="statToday">-</div>
    </div>
    <div class="stat-card">
      <div class="label">Compradores</div>
      <div class="value" id="statBuy">-</div>
    </div>
    <div class="stat-card">
      <div class="label">Vendedores</div>
      <div class="value" id="statSell">-</div>
    </div>
  </div>

  <div class="table-wrapper">
    <div class="table-header">
      <h2>Leads capturados</h2>
      <span class="refresh-hint">Se actualiza cada 15 segundos</span>
    </div>
    <div id="tableBody">
      <div class="loading">Cargando leads...</div>
    </div>
  </div>
</div>

<script>
const tableBody = document.getElementById('tableBody');

function formatDate(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  const day = String(d.getDate()).padStart(2, '0');
  const mon = String(d.getMonth() + 1).padStart(2, '0');
  const yr = d.getFullYear();
  const hr = String(d.getHours()).padStart(2, '0');
  const min = String(d.getMinutes()).padStart(2, '0');
  return day + '/' + mon + '/' + yr + ' ' + hr + ':' + min;
}

function esc(t) {
  if (!t) return '';
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

function badgeClass(intent) {
  const map = { comprar: 'badge-comprar', vender: 'badge-vender', alquilar: 'badge-alquilar' };
  return map[intent] || 'badge-informacion';
}

function isToday(iso) {
  if (!iso) return false;
  const d = new Date(iso);
  const now = new Date();
  return d.getDate() === now.getDate() && d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
}

async function loadLeads() {
  try {
    const res = await fetch('/chatbot/api/leads');
    const data = await res.json();
    const leads = data.leads || [];

    // Stats
    document.getElementById('statTotal').textContent = leads.length;
    document.getElementById('statToday').textContent = leads.filter(l => isToday(l.created_at)).length;
    document.getElementById('statBuy').textContent = leads.filter(l => l.intent === 'comprar').length;
    document.getElementById('statSell').textContent = leads.filter(l => l.intent === 'vender').length;

    if (leads.length === 0) {
      tableBody.innerHTML =
        '<div class="empty-state">' +
        '<h3>No hay leads todavia</h3>' +
        '<p>Cuando un cliente deje sus datos en el chatbot, apareceran aqui automaticamente.</p>' +
        '</div>';
      return;
    }

    let html = '<table><thead><tr>' +
      '<th>Fecha</th><th>Nombre</th><th>Contacto</th><th>Intencion</th>' +
      '<th>Zona</th><th>Presupuesto</th><th>Resumen</th>' +
      '</tr></thead><tbody>';

    for (const l of leads) {
      const budget = l.budget ? Number(l.budget).toLocaleString('es-ES') + ' \u20ac' : '-';
      html += '<tr>' +
        '<td style="white-space:nowrap">' + formatDate(l.created_at) + '</td>' +
        '<td><strong>' + esc(l.name) + '</strong></td>' +
        '<td><div class="contact-info">' +
          (l.email ? '<span class="email">' + esc(l.email) + '</span>' : '') +
          (l.phone ? '<span class="phone">' + esc(l.phone) + '</span>' : '') +
          (!l.email && !l.phone ? '-' : '') +
        '</div></td>' +
        '<td><span class="badge ' + badgeClass(l.intent) + '">' + esc(l.intent || 'info') + '</span></td>' +
        '<td>' + esc(l.location || '-') + '</td>' +
        '<td>' + budget + '</td>' +
        '<td><div class="summary-text">' + esc(l.summary || '-') + '</div></td>' +
        '</tr>';
    }

    html += '</tbody></table>';
    tableBody.innerHTML = html;
  } catch (e) {
    tableBody.innerHTML = '<div class="empty-state"><p>Error al cargar leads</p></div>';
  }
}

// Load immediately and refresh every 15 seconds
loadLeads();
setInterval(loadLeads, 15000);
</script>
</body>
</html>
