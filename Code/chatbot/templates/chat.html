<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cárdenas Real Estate — Chat</title>
<style>
  :root {
    --primary: #133d8d;
    --primary-light: #1a4fa6;
    --accent: #fcbb16;
    --bg: #f5f6f8;
    --white: #ffffff;
    --text: #2c2c2c;
    --text-light: #6b7280;
    --border: #e2e5ea;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    background: var(--primary);
    color: var(--white);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: var(--shadow);
    z-index: 10;
  }
  .header-logo {
    width: 40px; height: 40px;
    background: var(--accent);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 18px; color: var(--primary);
  }
  .header-info h1 { font-size: 16px; font-weight: 600; }
  .header-info p { font-size: 12px; opacity: 0.8; }
  .header-actions { margin-left: auto; display: flex; gap: 8px; }
  .header-btn {
    background: rgba(255,255,255,0.15);
    border: none; color: var(--white);
    padding: 6px 12px; border-radius: 8px;
    font-size: 12px; cursor: pointer;
    transition: background 0.2s;
  }
  .header-btn:hover { background: rgba(255,255,255,0.25); }
  .sync-dot {
    display: inline-block; width: 8px; height: 8px;
    border-radius: 50%; margin-right: 4px;
  }
  .sync-dot.ok { background: #4ade80; }
  .sync-dot.none { background: #f87171; }

  /* Messages area */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .msg {
    max-width: 80%;
    animation: fadeIn 0.3s ease;
  }
  .msg.user { align-self: flex-end; }
  .msg.assistant { align-self: flex-start; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-bubble {
    padding: 12px 16px;
    border-radius: var(--radius);
    line-height: 1.5;
    font-size: 14px;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .msg.user .msg-bubble {
    background: var(--primary);
    color: var(--white);
    border-bottom-right-radius: 4px;
  }
  .msg.assistant .msg-bubble {
    background: var(--white);
    color: var(--text);
    border-bottom-left-radius: 4px;
    box-shadow: var(--shadow);
  }

  /* Typing indicator */
  .typing {
    align-self: flex-start;
    display: none;
  }
  .typing.active { display: flex; }
  .typing-dots {
    background: var(--white);
    padding: 12px 20px;
    border-radius: var(--radius);
    border-bottom-left-radius: 4px;
    box-shadow: var(--shadow);
    display: flex; gap: 5px; align-items: center;
  }
  .typing-dots span {
    width: 7px; height: 7px;
    background: var(--text-light);
    border-radius: 50%;
    animation: bounce 1.4s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* Property cards */
  .property-cards {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding: 8px 0;
    max-width: 90vw;
  }
  .property-card {
    min-width: 260px;
    max-width: 280px;
    background: var(--white);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: var(--shadow);
    flex-shrink: 0;
    transition: transform 0.2s;
  }
  .property-card:hover { transform: translateY(-2px); }
  .property-card img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    background: var(--border);
  }
  .property-card-body { padding: 12px; }
  .property-card-body h3 {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 4px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .property-card-body .price {
    color: var(--primary);
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .property-card-body .meta {
    display: flex;
    gap: 10px;
    font-size: 12px;
    color: var(--text-light);
  }
  .property-card-body .ref {
    font-size: 11px;
    color: var(--accent);
    margin-top: 6px;
  }

  /* Input area */
  .input-area {
    padding: 12px 20px;
    background: var(--white);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .input-area textarea {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    max-height: 120px;
    line-height: 1.4;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-area textarea:focus {
    border-color: var(--primary-light);
  }
  .send-btn {
    width: 44px; height: 44px;
    background: var(--accent);
    color: var(--primary);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, transform 0.1s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: #e5a914; }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .send-btn svg { width: 20px; height: 20px; }

  /* Sync modal */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 100;
    align-items: center; justify-content: center;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--white);
    border-radius: 16px;
    padding: 24px;
    max-width: 420px;
    width: 90%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }
  .modal h2 { font-size: 18px; margin-bottom: 16px; color: var(--primary); }
  .modal label { font-size: 13px; color: var(--text-light); display: block; margin-bottom: 4px; }
  .modal input {
    width: 100%; padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px; font-size: 14px;
    margin-bottom: 12px; outline: none;
  }
  .modal input:focus { border-color: var(--primary-light); }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }
  .modal-btns button {
    padding: 8px 20px; border-radius: 8px;
    font-size: 14px; cursor: pointer; border: none;
  }
  .btn-primary { background: var(--accent); color: var(--primary); font-weight: 600; }
  .btn-primary:disabled { opacity: 0.5; }
  .btn-secondary { background: var(--border); color: var(--text); }
  .sync-status { font-size: 13px; color: var(--text-light); margin-bottom: 16px; }
  .sync-status strong { color: var(--text); }

  /* Welcome message */
  .welcome {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-light);
  }
  .welcome h2 {
    color: var(--primary);
    font-size: 20px;
    margin-bottom: 8px;
  }
  .welcome p { font-size: 14px; max-width: 400px; margin: 0 auto; }

  /* Responsive */
  @media (max-width: 600px) {
    .msg { max-width: 90%; }
    .property-cards { max-width: 95vw; }
    .property-card { min-width: 220px; }
    .header-info h1 { font-size: 14px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">C</div>
  <div class="header-info">
    <h1>Cardenas Real Estate</h1>
    <p>Asistente virtual</p>
  </div>
  <div class="header-actions">
    <button class="header-btn" id="syncBtn">
      <span class="sync-dot none" id="syncDot"></span> Sync
    </button>
    <button class="header-btn" id="leadsBtn">Leads</button>
  </div>
</div>

<div class="messages" id="messages">
  <div class="welcome" id="welcome">
    <h2>Bienvenido a Cardenas Real Estate</h2>
    <p>Soy tu asistente virtual. Preguntame sobre propiedades en Gran Canaria, nuestros servicios, o cualquier cosa que necesites.</p>
  </div>
  <div class="typing" id="typing">
    <div class="typing-dots">
      <span></span><span></span><span></span>
    </div>
  </div>
</div>

<div class="input-area">
  <textarea id="input" rows="1" placeholder="Escribe tu mensaje..." autofocus></textarea>
  <button class="send-btn" id="sendBtn" title="Enviar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/>
    </svg>
  </button>
</div>

<!-- Sync Modal -->
<div class="modal-overlay" id="syncModal">
  <div class="modal">
    <h2>Sincronizar Propiedades</h2>
    <div class="sync-status" id="syncStatus">Cargando estado...</div>
    <label>URL del feed XML</label>
    <input type="text" id="syncUrl" value="https://procesos.apinmo.com/xml/v2/L5iw2DpX/2934-web.xml">
    <div class="modal-btns">
      <button class="btn-secondary" onclick="closeSyncModal()">Cerrar</button>
      <button class="btn-primary" id="syncNowBtn" onclick="doSync()">Sincronizar ahora</button>
    </div>
  </div>
</div>

<!-- Leads Modal -->
<div class="modal-overlay" id="leadsModal">
  <div class="modal" style="max-width:600px">
    <h2>Leads Capturados</h2>
    <div id="leadsList" style="max-height:400px;overflow-y:auto;font-size:13px;"></div>
    <div class="modal-btns" style="margin-top:16px">
      <button class="btn-secondary" onclick="document.getElementById('leadsModal').classList.remove('active')">Cerrar</button>
    </div>
  </div>
</div>

<script>
const messagesEl = document.getElementById('messages');
const typingEl = document.getElementById('typing');
const welcomeEl = document.getElementById('welcome');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');

let chatId = crypto.randomUUID();
let history = [];
let isStreaming = false;

// Auto-resize textarea
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

// Send on Enter (Shift+Enter for newline)
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

sendBtn.addEventListener('click', sendMessage);

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addMessage(role, content) {
  if (welcomeEl) welcomeEl.style.display = 'none';
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `<div class="msg-bubble">${escapeHtml(content)}</div>`;
  messagesEl.insertBefore(div, typingEl);
  scrollToBottom();
  return div;
}

function addPropertyCards(properties) {
  const wrapper = document.createElement('div');
  wrapper.className = 'msg assistant';
  let html = '<div class="property-cards">';
  for (const p of properties) {
    const priceStr = p.price ? p.price.toLocaleString('es-ES') + ' \u20ac' : 'Consultar';
    html += `
      <div class="property-card">
        ${p.photo_main ? `<img src="${p.photo_main}" alt="${escapeHtml(p.title)}" loading="lazy">` : ''}
        <div class="property-card-body">
          <h3>${escapeHtml(p.title || p.type)}</h3>
          <div class="price">${priceStr}</div>
          <div class="meta">
            ${p.bedrooms ? `<span>${p.bedrooms} dorm.</span>` : ''}
            ${p.bathrooms ? `<span>${p.bathrooms} ba\u00f1o${p.bathrooms > 1 ? 's' : ''}</span>` : ''}
            ${p.surface_built ? `<span>${p.surface_built} m\u00b2</span>` : ''}
          </div>
          <div class="meta" style="margin-top:4px">${escapeHtml(p.zone || p.city || '')}</div>
          <div class="ref">REF: ${escapeHtml(p.ref)}</div>
        </div>
      </div>`;
  }
  html += '</div>';
  wrapper.innerHTML = html;
  messagesEl.insertBefore(wrapper, typingEl);
  scrollToBottom();
}

function escapeHtml(text) {
  if (!text) return '';
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isStreaming) return;

  isStreaming = true;
  sendBtn.disabled = true;
  inputEl.value = '';
  inputEl.style.height = 'auto';

  addMessage('user', text);
  history.push({ role: 'user', content: text });

  typingEl.classList.add('active');
  scrollToBottom();

  let assistantDiv = null;
  let assistantText = '';

  try {
    const response = await fetch('/chatbot/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        chat_id: chatId,
        message: text,
        history: history.slice(0, -1), // exclude current message (already in messages)
      }),
    });

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    typingEl.classList.remove('active');

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const jsonStr = line.slice(6).trim();
        if (!jsonStr) continue;

        try {
          const event = JSON.parse(jsonStr);

          if (event.type === 'text') {
            if (!assistantDiv) {
              assistantDiv = addMessage('assistant', '');
            }
            assistantText += event.content;
            assistantDiv.querySelector('.msg-bubble').textContent = assistantText;
            scrollToBottom();
          } else if (event.type === 'properties') {
            addPropertyCards(event.data);
          } else if (event.type === 'done') {
            if (assistantText) {
              history.push({ role: 'assistant', content: assistantText });
            }
          } else if (event.type === 'error') {
            addMessage('assistant', 'Lo siento, ha ocurrido un error. Por favor, int\u00e9ntalo de nuevo.');
          }
        } catch (e) {
          // skip malformed json
        }
      }
    }
  } catch (err) {
    typingEl.classList.remove('active');
    addMessage('assistant', 'No se pudo conectar con el servidor. Verifica que est\u00e1 en funcionamiento.');
    console.error(err);
  }

  isStreaming = false;
  sendBtn.disabled = false;
  inputEl.focus();
}

// ── Sync ──────────────────────────────────────────────────────────────────

document.getElementById('syncBtn').addEventListener('click', () => {
  document.getElementById('syncModal').classList.add('active');
  loadSyncStatus();
});

function closeSyncModal() {
  document.getElementById('syncModal').classList.remove('active');
}

async function loadSyncStatus() {
  try {
    const res = await fetch('/chatbot/api/sync/status');
    const data = await res.json();
    const el = document.getElementById('syncStatus');
    const dot = document.getElementById('syncDot');

    if (data.synced && data.meta) {
      const date = new Date(data.meta.last_sync).toLocaleString('es-ES');
      el.innerHTML = `\u00daltima sincronizaci\u00f3n: <strong>${date}</strong><br>Propiedades activas: <strong>${data.property_count}</strong>`;
      dot.className = 'sync-dot ok';
    } else {
      el.innerHTML = 'No se ha sincronizado a\u00fan. Pulsa "Sincronizar ahora" para cargar las propiedades.';
      dot.className = 'sync-dot none';
    }
  } catch {
    document.getElementById('syncStatus').textContent = 'Error al obtener estado';
  }
}

async function doSync() {
  const btn = document.getElementById('syncNowBtn');
  const url = document.getElementById('syncUrl').value.trim();
  btn.disabled = true;
  btn.textContent = 'Sincronizando...';

  try {
    const res = await fetch('/chatbot/api/sync', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url }),
    });
    const data = await res.json();
    if (data.ok) {
      document.getElementById('syncStatus').innerHTML =
        `Sincronizado: <strong>${data.total_properties}</strong> propiedades cargadas.`;
      document.getElementById('syncDot').className = 'sync-dot ok';
    } else {
      document.getElementById('syncStatus').textContent = 'Error: ' + (data.error || 'desconocido');
    }
  } catch (e) {
    document.getElementById('syncStatus').textContent = 'Error de conexi\u00f3n';
  }

  btn.disabled = false;
  btn.textContent = 'Sincronizar ahora';
}

// ── Leads ──────────────────────────────────────────────────────────────────

document.getElementById('leadsBtn').addEventListener('click', async () => {
  document.getElementById('leadsModal').classList.add('active');
  const el = document.getElementById('leadsList');
  el.innerHTML = 'Cargando...';

  try {
    const res = await fetch('/chatbot/api/leads');
    const data = await res.json();
    if (!data.leads || data.leads.length === 0) {
      el.innerHTML = '<p style="color:#6b7280">No hay leads capturados a\u00fan.</p>';
      return;
    }
    let html = '<table style="width:100%;border-collapse:collapse;font-size:12px">';
    html += '<tr style="text-align:left;border-bottom:2px solid #e5e2dc"><th style="padding:6px">Fecha</th><th>Nombre</th><th>Contacto</th><th>Intent</th><th>Resumen</th></tr>';
    for (const l of data.leads) {
      const date = new Date(l.created_at).toLocaleDateString('es-ES');
      const contact = l.email || l.phone || '-';
      html += `<tr style="border-bottom:1px solid #e5e2dc">
        <td style="padding:6px">${date}</td>
        <td>${escapeHtml(l.name)}</td>
        <td>${escapeHtml(contact)}</td>
        <td>${escapeHtml(l.intent)}</td>
        <td>${escapeHtml(l.summary)}</td>
      </tr>`;
    }
    html += '</table>';
    el.innerHTML = html;
  } catch {
    el.innerHTML = 'Error al cargar leads';
  }
});

// Load sync status on page load
loadSyncStatus();
</script>
</body>
</html>
